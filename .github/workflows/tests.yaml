name: Run Tests

on:
  push:
    branches:
      - '**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Skip runs where the commit message starts with 'wip:' (case-insensitive)
    if: "!startsWith(tolower(github.event.head_commit.message), 'wip:')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install .NET MAUI Workloads
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore tests/TripFund.Tests/TripFund.Tests.csproj

      - name: Run tests
        run: dotnet test tests/TripFund.Tests/TripFund.Tests.csproj --no-restore --verbosity normal
